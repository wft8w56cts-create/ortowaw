<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Optometryczny - Zewnętrzny plik SVG</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020208;
            font-family: 'Segoe UI', Arial, sans-serif; cursor: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #map-wrapper {
            position: relative;
            width: 65vh; 
            height: 92vh; 
            opacity: 1;
        }

        /* Automatyczne nadawanie stylów elementom wewnątrz pobranego SVG */
        svg { width: 100%; height: 100%; pointer-events: none; }

        svg path {
            fill: #050515 !important;
            stroke: #1a1a3a !important;
            stroke-width: 2px !important;
            transition: stroke 0.4s, stroke-width 0.4s, fill 0.4s;
        }

        svg path.active {
            stroke: #00ffcc !important;
            stroke-width: 6px !important;
            filter: drop-shadow(0 0 12px #00ffcc);
        }

        svg path.completed {
            stroke: #ffcc00 !important;
            fill: rgba(255, 204, 0, 0.08) !important;
        }

        #Wielka_Wisła {
            stroke: #102040 !important;
            stroke-width: 5px !important;
            fill: none !important;
        }

        #start-point {
            position: absolute; width: 24px; height: 24px;
            background: #ff3366; border-radius: 50%;
            box-shadow: 0 0 15px #ff3366; transform: translate(-50%, -50%);
            display: none; z-index: 10;
        }

        #flashlight {
            position: absolute; width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.6) 35%, rgba(255,255,255,0) 70%);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: screen;
            box-shadow: 0 0 40px rgba(255,255,255,0.4);
            left: 50%; top: 50%; z-index: 5;
        }

        #menu-panel { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 1000; }
        #btn-connect { background: #00ffcc; border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px #00ffcc; font-family: inherit; }
        #hud { margin-top: 15px; font-size: 1.5rem; text-shadow: 0 0 10px #000; }
        #target-info { font-size: 1.3rem; color: #ffcc00; margin-top: 5px; font-weight: bold; }

        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050514; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
        }

        #webcam-container { position: absolute; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #333; border-radius: 8px; overflow: hidden; opacity: 0.4; transform: scaleX(-1); }
        video { width: 100%; height: 100%; object-fit: cover; }
        #warning-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.6); color: white; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; z-index: 999; text-align: center; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Zezwól na dostęp do kamery...</h1>
        <p style="color: #878787; font-size: 1.2rem;">Trwa uruchamianie systemu śledzenia twarzy.</p>
    </div>

    <div id="game-container">
        <div id="menu-panel">
            <button id="btn-connect" onclick="connectSphero()">🔗 POŁĄCZ SPHERO MINI</button>
            <div id="hud">Dzielnica: <span id="level">1</span>/<span id="total-levels">0</span></div>
            <div id="target-info">Wyszukiwanie dzielnic...</div>
        </div>

        <div id="map-wrapper">
            <div id="start-point"></div>
            </div>

        <div id="flashlight"></div>
        <div id="warning-overlay">NIE RUSZAJ GŁOWĄ!<br><span style="font-size: 1.5rem;">Trzymaj pozycję pionową</span></div>
    </div>

    <div id="webcam-container"><video id="webcam" autoplay playsinline></video></div>

    <script>
        const flashlight = document.getElementById('flashlight');
        const startPoint = document.getElementById('start-point');
        const levelEl = document.getElementById('level');
        const warningOverlay = document.getElementById('warning-overlay');
        const videoElement = document.getElementById('webcam');
        const btnConnect = document.getElementById('btn-connect');
        const mapWrapper = document.getElementById('map-wrapper');
        const targetInfo = document.getElementById('target-info');
        const loadingScreen = document.getElementById('loading-screen');

        let districts = [];
        let currentLevel = 0;
        let isHeadMoving = false;
        let isCelebrating = false;
        let baseHeadX = null;
        let isSystemActive = false;

        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;
        const SENSITIVITY = 1.5;

        let activePath = null;
        let pointsToTrack = [];
        let nextPointIndex = 0;
        const svgWidth = 3178.56; 

        // --- NAZWA TWOJEGO ZEWNĘTRZNEGO PLIKU ---
        const EXTERNAL_SVG_URL = "mapa_warszawy.svg"; 

        // Funkcja pobierająca plik SVG z dysku i wstrzykująca go do gry
        async function loadExternalSVG() {
            try {
                const response = await fetch(EXTERNAL_SVG_URL);
                if (!response.ok) throw new Error("Nie można załadować pliku SVG.");
                
                const svgText = await response.text();
                
                // Tworzymy tymczasowy element, aby wyciągnąć czysty węzeł <svg>
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgText, "image/svg+xml");
                const svgElement = svgDoc.querySelector("svg");
                
                if (!svgElement) throw new Error("Plik nie zawiera poprawnego kodu SVG.");
                
                // Wymuszamy, by pobrany SVG miał odpowiednie ID dla skryptu
                svgElement.setAttribute("id", "warsaw-svg");
                
                // Wstrzykujemy pobrany kod prosto do map-wrapper
                mapWrapper.appendChild(svgElement);
                
                // Dopiero gdy plik fizycznie pojawił się na ekranie, skanujemy dzielnice
                scanDistricts();
            } catch (error) {
                console.error(error);
                targetInfo.innerText = "❌ BŁĄD: Brak pliku 'mapa_warszawy.svg' w folderze!";
                targetInfo.style.color = "#ff3366";
            }
        }

       
function scanDistricts() {
    districts = [];
    const allPaths = document.querySelectorAll('#warsaw-svg path');
    
    allPaths.forEach(path => {
        const id = path.id;
        // Ignorujemy tylko definicje systemowe i wielkie maski tła
        if (id && !id.startsWith("clipPath") && id !== "path1" && id !== "path2" && id !== "path3" && id !== "path4") {
            districts.push(path);
        }
    });

    // Jeśli ścieżki nie mają ładnych nazw, nadajemy im nazwy robocze
    districts.forEach((path, index) => {
        if (!path.id || path.id.startsWith("path")) {
            path.setAttribute("id", `Obszar_${index + 1}`);
        }
    });

    if (districts.length === 0) {
        targetInfo.innerText = "❌ Nie znaleziono dzielnic wewnątrz SVG!";
        return;
    }

    document.getElementById('total-levels').innerText = districts.length;
    isSystemActive = true;
    initLevel(currentLevel);
}


        function initLevel(levelIndex) {
            if(!isSystemActive || districts.length === 0) return;
            
            if(levelIndex >= districts.length) {
                targetInfo.innerText = "🏆 Gratulacje! Cała Warszawa rozświetlona!";
                startPoint.style.display = 'none';
                return;
            }

            levelEl.innerText = levelIndex + 1;
            activePath = districts[levelIndex];
            activePath.classList.add('active');
            
            targetInfo.innerText = `Obrysuj granicę: ${activePath.id.replace(/_/g, ' ')}`;

            pointsToTrack = [];
            const pathLength = activePath.getTotalLength();
            const sampleCount = 40; 

            for (let i = 0; i <= sampleCount; i++) {
                const ratio = i / sampleCount;
                pointsToTrack.push(activePath.getPointAtLength(ratio * pathLength));
            }

            nextPointIndex = 0;
            positionStartPoint();
        }

        function positionStartPoint() {
            if (!pointsToTrack.length) return;
            const wrapperRect = mapWrapper.getBoundingClientRect();
            const pt = pointsToTrack[nextPointIndex];
            const scale = wrapperRect.width / svgWidth;

            startPoint.style.left = (pt.x * scale) + 'px';
            startPoint.style.top = (pt.y * scale) + 'px';
            startPoint.style.display = 'block';
        }

        function updateFlashlightPosition() {
            currentX = Math.max(0, Math.min(window.innerWidth, currentX));
            currentY = Math.max(0, Math.min(window.innerHeight, currentY));
            flashlight.style.left = currentX + 'px';
            flashlight.style.top = currentY + 'px';

            if (isSystemActive && !isCelebrating && !isHeadMoving) {
                checkPathTracking(currentX, currentY);
            }
        }

        function checkPathTracking(flashX, flashY) {
            if (pointsToTrack.length === 0) return;

            const wrapperRect = mapWrapper.getBoundingClientRect();
            const scale = wrapperRect.width / svgWidth;

            const targetPt = pointsToTrack[nextPointIndex];
            const targetX = wrapperRect.left + (targetPt.x * scale);
            const targetY = wrapperRect.top + (targetPt.y * scale);

            const distance = Math.hypot(flashX - targetX, flashY - targetY);

            if (distance < 65) { 
                nextPointIndex++;
                if (nextPointIndex >= pointsToTrack.length) {
                    triggerLevelComplete();
                } else {
                    positionStartPoint();
                }
            }
        }

        function triggerLevelComplete() {
            isCelebrating = true;
            startPoint.style.display = 'none';
            activePath.classList.remove('active');
            activePath.classList.add('completed');
            targetInfo.innerText = `✨ Doskonale! ${activePath.id.replace(/_/g, ' ')} zaliczony! ✨`;

            setTimeout(() => {
                currentLevel++;
                initLevel(currentLevel);
                isCelebrating = false;
            }, 1500);
        }

        // --- BLUETOOTH CONTROL ---
        let spheroCharacteristic = null;
        async function connectSphero() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'SM-' }, { namePrefix: 'Sphero' }],
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                const characteristics = await service.getCharacteristics();
                const notifyChar = characteristics.find(c => c.properties.notify);
                if (notifyChar) {
                    await notifyChar.startNotifications();
                    notifyChar.addEventListener('characteristicvaluechanged', (e) => {
                        if (isHeadMoving || isCelebrating || !isSystemActive) return;
                        const value = e.target.value;
                        let pitch = value.getInt16(12, false);
                        let roll = value.getInt16(14, false);
                        if (Math.abs(roll) > 5) currentX += (roll * SENSITIVITY) / 100;
                        if (Math.abs(pitch) > 5) currentY -= (pitch * SENSITIVITY) / 100;
                        updateFlashlightPosition();
                    });
                    spheroCharacteristic = notifyChar;
                    btnConnect.innerText = "🟢 POŁĄCZONO!";
                }
            } catch (error) { btnConnect.innerText = "❌ BŁĄD BT"; }
        }

        window.addEventListener('mousemove', (e) => {
            if (spheroCharacteristic || isHeadMoving || isCelebrating) return;
            currentX = e.clientX; currentY = e.clientY;
            updateFlashlightPosition();
        });
        window.addEventListener('resize', () => { if(isSystemActive) positionStartPoint(); });

        // --- URUCHAMIANIE KAMERY I OBSŁUGA STARTU ---
        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        faceMesh.onResults((results) => {
            if (loadingScreen.style.display !== 'none') {
                loadingScreen.style.display = 'none';
                loadExternalSVG(); // <--- Dynamiczne pobranie zewnętrznego pliku po starcie kamery
            }

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const noseX = results.multiFaceLandmarks[0][4].x;
                if (baseHeadX === null) baseHeadX = noseX;
                if (Math.abs(noseX - baseHeadX) > 0.025) {
                    isHeadMoving = true; warningOverlay.style.display = 'flex';
                } else {
                    isHeadMoving = false; warningOverlay.style.display = 'none';
                }
            }
        });

        const camera = new Camera(videoElement, { 
            onFrame: async () => { await faceMesh.send({ image: videoElement }); }, 
            width: 640, height: 480 
        });
        camera.start();
    </script>
</body>
</html>
