
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Optometryczny - Sphero Mini i Detekcja Twarzy</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif; cursor: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: #050510; overflow: hidden;
        }

        /* Bardzo ciemne, klimatyczne tło kosmosu widoczne tylko w świetle latarki */
        #background-content {
            position: absolute; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: cover; background-position: center;
            opacity: 0.15;
        }

        /* Plama światła "latarki" */
        #flashlight {
            position: absolute; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.8) 40%, rgba(255,255,255,0) 70%);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: screen;
            box-shadow: 0 0 50px rgba(255,255,255,0.5);
            left: 50%; top: 50%; /* Start na środku */
        }

        /* Cel (Rakieta), który ukrywa się w mroku */
        .target {
            position: absolute; width: 60px; height: 60px;
            background: #00ffcc; border-radius: 50%;
            box-shadow: 0 0 20px #00ffcc; display: flex;
            align-items: center; justify-content: center;
            font-size: 30px; transform: translate(-50%, -50%);
            opacity: 0.02; 
            /* Płynne animacje dla pojawiania się i celebracji */
            transition: opacity 0.2s, transform 0.5s ease-out, background 0.3s;
        }

        /* Gdy latarka oświetla cel */
        .target.revealed { 
            opacity: 1 !important; 
        }

        /* Panel interfejsu (Bluetooth i Punkty) */
        #menu-panel {
            position: absolute; top: 20px; left: 20px;
            color: #fff; z-index: 1000; pointer-events: auto;
        }

        button {
            background: #00ffcc; border: none; padding: 12px 24px;
            font-size: 1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px #00ffcc;
            font-family: inherit; transition: all 0.2s;
        }
        button:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 25px #fff; }

        #hud { margin-top: 15px; font-size: 1.5rem; text-shadow: 0 0 10px #000; }

        /* Miniaturka z kamerki w prawym dolnym rogu (kontrola pozycji) */
        #webcam-container {
            position: absolute; bottom: 10px; right: 10px;
            width: 160px; height: 120px; border: 2px solid #333;
            border-radius: 8px; overflow: hidden; opacity: 0.5; transform: scaleX(-1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Czerwony ekran blokady, gdy dziecko poruszy głową */
        #warning-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.6); color: white;
            justify-content: center; align-items: center; font-size: 3rem;
            font-weight: bold; text-shadow: 2px 2px 10px #000; z-index: 999; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="background-content"></div>
        <div id="flashlight"></div>
        <div id="target" class="target">🚀</div>
        
        <div id="menu-panel">
            <button id="btn-connect" onclick="connectSphero()">🔗 POŁĄCZ SPHERO MINI</button>
            <div id="hud">Punkty: <span id="score">0</span></div>
        </div>
        
        <div id="warning-overlay">
            NIE RUSZAJ GŁOWĄ!<br>
            <span style="font-size: 1.5rem;">Trzymaj głowę prosto, steruj tylko ręką i oczami</span>
        </div>
    </div>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <script>
        const flashlight = document.getElementById('flashlight');
        const target = document.getElementById('target');
        const scoreEl = document.getElementById('score');
        const warningOverlay = document.getElementById('warning-overlay');
        const videoElement = document.getElementById('webcam');
        const btnConnect = document.getElementById('btn-connect');

        let score = 0;
        let isHeadMoving = false;
        let isCelebrating = false; // Blokada gry na czas trwania animacji sukcesu
        let baseHeadX = null;

        // Wirtualne współrzędne latarki (zaczynamy na środku ekranu)
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;

        // Czułość sterowania kulką Sphero Mini
        const SENSITIVITY = 1.5; 

        // Funkcja nanosząca pozycję latarki na ekran
        function updateFlashlightPosition() {
            // Ograniczenie ruchu do obszaru okna
            currentX = Math.max(0, Math.min(window.innerWidth, currentX));
            currentY = Math.max(0, Math.min(window.innerHeight, currentY));

            flashlight.style.left = currentX + 'px';
            flashlight.style.top = currentY + 'px';

            checkCollision(currentX, currentY);
        }

        // --- 1. SPHERO MINI (WEB BLUETOOTH API) ---
        let spheroCharacteristic = null;

        async function connectSphero() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'SM-' }, { namePrefix: 'Sphero' }],
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });

                btnConnect.innerText = "Łączenie...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                const characteristics = await service.getCharacteristics();
                const notifyChar = characteristics.find(c => c.properties.notify);
                
                if (notifyChar) {
                    await notifyChar.startNotifications();
                    notifyChar.addEventListener('characteristicvaluechanged', handleSpheroSensors);
                    
                    spheroCharacteristic = notifyChar; // Oznaczenie, że aktywowaliśmy Sphero
                    
                    btnConnect.innerText = "🟢 POŁĄCZONO!";
                    btnConnect.style.background = "#88ff88";
                    btnConnect.style.boxShadow = "0 0 15px #88ff88";
                    console.log("Sphero aktywne!");
                }
            } catch (error) {
                console.error("Błąd połączenia Bluetooth:", error);
                btnConnect.innerText = "❌ BŁĄD. SPRÓBUJ PONOWNIE";
                btnConnect.style.background = "#ff8888";
            }
        }

        // Odczytywanie danych z żyroskopu Sphero
        function handleSpheroSensors(event) {
            if (isHeadMoving || isCelebrating) return; 

            const value = event.target.value;
            // Odczyt danych binarnego protokołu Sphero (kąty Pitch i Roll)
            let pitch = value.getInt16(12, false); 
            let roll = value.getInt16(14, false);  

            // Martwa strefa (odrzucanie drobnych drżeń rąk)
            if (Math.abs(roll) > 5) currentX += (roll * SENSITIVITY) / 100;
            if (Math.abs(pitch) > 5) currentY -= (pitch * SENSITIVITY) / 100;

            updateFlashlightPosition();
        }

        // --- 2. STEROWANIE AWARYJNE / TESTOWE (MYSZKA) ---
        // Działa automatycznie, dopóki nie sparujesz kulki Sphero
        window.addEventListener('mousemove', (e) => {
            if (spheroCharacteristic || isHeadMoving || isCelebrating) return; 
            currentX = e.clientX;
            currentY = e.clientY;
            updateFlashlightPosition();
        });

        // --- 3. LOGIKA ROZGRYWKI I ANIMACJA CELEBRACJI ---
        function moveTarget() {
            const x = Math.random() * (window.innerWidth - 150) + 75;
            const y = Math.random() * (window.innerHeight - 150) + 75;
            
            // Reset stylów rakiety przed kolejnym losem
            target.style.transition = 'none'; 
            target.style.transform = 'translate(-50%, -50%) scale(1)';
            target.style.background = '#00ffcc';
            target.style.boxShadow = '0 0 20px #00ffcc';
            target.innerText = '🚀';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.classList.remove('revealed');
            
            // Przywrócenie animacji przejść
            setTimeout(() => {
                target.style.transition = 'opacity 0.2s, transform 0.5s ease-out, background 0.3s';
            }, 50);
        }

        function checkCollision(flashX, flashY) {
            if (isCelebrating) return;

            const targetRect = target.getBoundingClientRect();
            const targetX = targetRect.left + targetRect.width / 2;
            const targetY = targetRect.top + targetRect.height / 2;

            const distance = Math.hypot(flashX - targetX, flashY - targetY);

            // Wykrywanie poświaty (zbliżanie się)
            if (distance < 120) {
                target.classList.add('revealed');
                
                // Precyzyjne najechanie środkiem latarki (trafienie)
                if (distance < 40) {
                    triggerSuccessCelebration();
                }
            } else {
                target.classList.remove('revealed');
            }
        }

        function triggerSuccessCelebration() {
            isCelebrating = true; // Zatrzymujemy grę, dajemy dziecku czas na reakcję
            
            // Faza 1: Rakieta rośnie, zmienia kolor na złoty i błyszczy
            target.style.transform = 'translate(-50%, -50%) scale(2)';
            target.style.background = '#ffcc00'; 
            target.style.boxShadow = '0 0 40px #ffcc00';
            target.innerText = '✨🚀✨'; 

            // Faza 2: Po 1.2 sekundy rakieta "odlatuje" (kurczy się do zera)
            setTimeout(() => {
                target.style.transform = 'translate(-50%, -50%) scale(0)';
                
                // Faza 3: Naliczanie punktu i przemieszczenie rakiety
                setTimeout(() => {
                    score++;
                    scoreEl.innerText = score;
                    
                    moveTarget();
                    isCelebrating = false; // Powrót do gry
                }, 300); 

            }, 1200); // Czas trwania złotej celebracji (1200 ms)
        }

        // Losowanie pierwszej pozycji na starcie
        moveTarget();

        // --- 4. DETEKCJA RUCHU GŁOWY (MEDIAPIPE FACE MESH) ---
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });

        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const noseX = landmarks[4].x; // Punkt czubka nosa

                if (baseHeadX === null) baseHeadX = noseX; // Kalibracja pozycji startowej
                const deviation = Math.abs(noseX - baseHeadX);

                // Próg tolerancji dla ruchu głowy
                if (deviation > 0.025) {
                    isHeadMoving = true;
                    warningOverlay.style.display = 'flex';
                } else {
                    isHeadMoving = false;
                    warningOverlay.style.display = 'none';
                }
            }
        });

        // Uruchomienie kamery internetowej
        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
