<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Optometryczny - Ścieżka A (Hybrydowy Biofeedback)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020208;
            font-family: 'Segoe UI', Arial, sans-serif; cursor: none;
        }

        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050514; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
            cursor: default;
        }
        .setup-section {
            background: rgba(255,255,255,0.05); padding: 20px; 
            border-radius: 15px; margin: 10px; width: 380px; text-align: center;
            border: 1px solid #1a1a3a;
        }
        select, button {
            padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 25px;
            border: none; margin-top: 10px; width: 100%; cursor: pointer; font-family: inherit;
        }
        select { background: #1a1a3a; color: white; border: 1px solid #333; }
        #btn-start { background: #ff3366; color: white; font-size: 1.4rem; margin-top: 15px; box-shadow: 0 0 20px #ff3366; }
        #btn-start:hover { background: #00ffcc; color: black; box-shadow: 0 0 20px #00ffcc; }
        
        #btn-download { background: #0055ff; color: white; margin-top: 10px; display: none; box-shadow: 0 0 10px #0055ff; }
        #btn-download:hover { background: #3388ff; }

        #game-container { position: relative; width: 100vw; height: 100vh; display: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* MODYFIKACJA: Latarka z płynnym przejściem stylów (transition) dla efektu baterii */
        #flashlight {
            position: absolute; width: 240px; height: 240px;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: screen; left: 50%; top: 50%; z-index: 5;
            transition: background 0.15s ease, border 0.15s ease;
            /* Domyślny stan: pełna moc */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.4) 40%, rgba(255,255,255,0) 70%);
            border: 2px dashed rgba(0, 255, 204, 0.4);
        }

        #hud-panel { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 1000; font-size: 1.5rem; text-shadow: 0 0 10px #000; }
        #btn-back { position: absolute; top: 20px; right: 20px; background: #333; color: white; width: auto; font-size: 0.9rem; padding: 8px 15px; z-index: 1000; }
        
        #webcam-container { position: absolute; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #333; border-radius: 8px; overflow: hidden; opacity: 0.2; transform: scaleX(-1); }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 style="font-size: 2.2rem; margin-bottom: 5px; letter-spacing: 1px;">TRENING OPTOMETRYCZNY</h1>
        <p style="color: #00ffcc; margin-bottom: 25px; font-weight: bold;">Ścieżka A: Kamera internetowa + Immersyjny Biofeedback</p>

        <div class="setup-section">
            <label style="font-weight: bold; color: #ffffff;">WYBIERZ TRYB GRY:</label>
            <select id="game-mode-select" onchange="toggleMazeOptions()">
                <option value="rocket">Tryb 1: Goniąca Rakieta (Płynny ruch)</option>
                <option value="bug">Tryb 2: Robaczek w labiryncie</option>
                <option value="classic">Tryb 3: Pierwotna Rakieta (Ruch + Wybuch)</option>
                <option value="static">Tryb 4: Nieruchoma Rakieta (Fiksacja)</option>
            </select>
        </div>

        <div class="setup-section" id="maze-config" style="display: none;">
            <label style="font-weight: bold; color: #ffcc00;">WYBIERZ WERSJĘ LABIRYNTU:</label>
            <select id="maze-type-select">
                <option value="1">Labirynt 1: Prosta Fala</option>
                <option value="2">Labirynt 2: Średnia Pętla</option>
                <option value="3">Labirynt 3: Zakręcona Spirala</option>
            </select>
        </div>

        <div style="width: 380px;">
            <button id="btn-start" onclick="startGame()">URUCHOM ĆWICZENIE 🚀</button>
            <button id="btn-download" onclick="downloadCSV()">💾 POBIERZ LOGI RUCHU (.CSV)</button>
        </div>
    </div>

    <div id="game-container">
        <button id="btn-back" onclick="exitToMenu()">⚙️ MENU</button>
        <div id="hud-panel"><span id="hud-text">Uruchamianie...</span></div>
        <canvas id="game-canvas"></canvas>
        <div id="flashlight"></div>
    </div>

    <div id="webcam-container"><video id="webcam" autoplay playsinline></video></div>

    <script>
        const menuScreen = document.getElementById('menu-screen');
        const gameContainer = document.getElementById('game-container');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const flashlight = document.getElementById('flashlight');
        const videoElement = document.getElementById('webcam');
        const hudText = document.getElementById('hud-text');
        const btnDownload = document.getElementById('btn-download');

        let gameMode = 'rocket';
        let mazeType = '1';
        let isGameRunning = false;

        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;

        // Logika głowy i biofeedbacku
        let isHeadMoving = false;
        let baseHeadX = null;
        let currentHeadDeviation = 0; 
        let lastNoseX = null;
        const HEAD_TOLERANCE = 0.022;  
        
        let telemetryLog = [];
        let sessionStartTime = 0;
        let lastLogTime = 0;

        let audioCtx = null;
        function playBeep(freq, duration, type="sine") {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function calibrateHeadPosition() {
            if (lastNoseX !== null) {
                baseHeadX = lastNoseX;
                playBeep(587.33, 0.1, "sine");
            }
        }

        function drawVectorRocket(x, y, radius, angle, isLit, pulseValue = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.scale(radius / 20, radius / 20);

            if (!isGameRunning || Math.random() > 0.3) {
                ctx.beginPath(); ctx.moveTo(-15, -5);
                ctx.lineTo(-30 - (isLit ? Math.sin(pulseValue)*10 : Math.random()*8), 0);
                ctx.lineTo(-15, 5);
                ctx.fillStyle = isLit ? '#00ffcc' : '#ff9900'; ctx.fill();
            }
            ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(-18, -15); ctx.lineTo(-5, -5);
            ctx.moveTo(-10, 5); ctx.lineTo(-18, 15); ctx.lineTo(-5, 5);
            ctx.fillStyle = isLit ? '#00ccaa' : '#cc2255'; ctx.fill();

            ctx.beginPath(); ctx.moveTo(-15, -7); ctx.lineTo(5, -7);
            ctx.quadraticCurveTo(20, 0, 25, 0); ctx.quadraticCurveTo(20, 0, 5, 7); ctx.lineTo(-15, 7);
            ctx.closePath();
            ctx.fillStyle = isLit ? '#00ffcc' : '#ff3366';
            if (isLit) { ctx.shadowBlur = 20; ctx.shadowColor = '#00ffcc'; } 
            else { ctx.shadowBlur = 5; ctx.shadowColor = '#ff3366'; }
            ctx.fill();

            ctx.beginPath(); ctx.arc(2, 0, 4, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
            ctx.restore(); ctx.shadowBlur = 0;
        }

        // --- STRUKTURY OBIEKTÓW ---
        let rocketMode1 = { x: 0, y: 0, radius: 22, speed: 3.5, direction: 1, isLit: false, pulse: 0, angle: 0 };
        let bug = { progress: 0, speed: 0.002, size: 14, isLit: false };
        let mazePoints = [];
        let classicRocket = { x: 0, y: 0, vx: 2, vy: 1, radius: 25, lockTime: 0, score: 0, angle: 0 };
        let staticRocket = { x: 0, y: 0, radius: 25, lockTime: 0, score: 0, angle: -Math.PI / 4 };
        let particles = [];
        let targetPos = { x: 0, y: 0 };

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function toggleMazeOptions() {
            const mode = document.getElementById('game-mode-select').value;
            document.getElementById('maze-config').style.display = (mode === 'bug') ? 'block' : 'none';
        }

        function generateMaze(type) {
            mazePoints = [];
            const w = canvas.width; const h = canvas.height;
            if (type === '1') { 
                for (let x = w * 0.1; x <= w * 0.9; x += 5) {
                    let y = h / 2 + Math.sin(x * 0.008) * (h * 0.15); mazePoints.push({ x, y });
                }
            } else if (type === '2') { 
                for (let t = 0; t < Math.PI * 2; t += 0.01) {
                    let x = w / 2 + Math.sin(t) * (w * 0.35); let y = h / 2 + Math.sin(t * 2) * (h * 0.25); mazePoints.push({ x, y });
                }
            } else { 
                let centerX = w / 2; let centerY = h / 2;
                for (let angle = 0; angle < Math.PI * 6; angle += 0.02) {
                    let radius = (angle * 22) + 40; let x = centerX + Math.cos(angle) * radius; let y = centerY + Math.sin(angle) * radius;
                    if(x > w*0.05 && x < w*0.95 && y > h*0.05 && y < h*0.95) mazePoints.push({ x, y });
                }
            }
        }

        function spawnClassicRocket() {
            classicRocket.x = Math.random() * (canvas.width * 0.6) + (canvas.width * 0.2);
            classicRocket.y = Math.random() * (canvas.height * 0.6) + (canvas.height * 0.2);
            classicRocket.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + 1.5);
            classicRocket.vy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.5 + 1);
            classicRocket.lockTime = 0;
        }

        function spawnStaticRocket() {
            staticRocket.x = Math.random() * (canvas.width * 0.7) + (canvas.width * 0.15);
            staticRocket.y = Math.random() * (canvas.height * 0.7) + (canvas.height * 0.15);
            staticRocket.lockTime = 0;
        }

        function createExplosion(x, y) {
            for(let i=0; i<25; i++) {
                particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, alpha: 1,
                    color: `hsl(${Math.random() * 60 + 340}, 100%, 60%)`
                });
            }
        }

        function startGame() {
            gameMode = document.getElementById('game-mode-select').value;
            mazeType = document.getElementById('maze-type-select').value;

            menuScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            document.body.style.cursor = 'none';
            
            telemetryLog = [];
            sessionStartTime = performance.now();
            lastLogTime = 0;
            baseHeadX = null; 

            if (gameMode === 'rocket') {
                rocketMode1.x = canvas.width * 0.1; rocketMode1.y = canvas.height / 2;
                hudText.innerText = "Tryb 1: Rozświetlaj lecącą rakietę! [R - Kalibracja głowy]";
            } else if (gameMode === 'bug') {
                generateMaze(mazeType); bug.progress = 0;
                hudText.innerText = "Tryb 2: Oświetlaj robaczka, aby szedł! [R - Kalibracja głowy]";
            } else if (gameMode === 'classic') {
                classicRocket.score = 0; spawnClassicRocket();
                hudText.innerText = `Tryb 3: Punkty: ${classicRocket.score} [R - Kalibracja głowy]`;
            } else if (gameMode === 'static') {
                staticRocket.score = 0; spawnStaticRocket();
                hudText.innerText = `Tryb 4: Punkty: ${staticRocket.score} [R - Kalibracja głowy]`;
            }

            isGameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function exitToMenu() {
            isGameRunning = false;
            gameContainer.style.display = 'none';
            menuScreen.style.display = 'flex';
            document.body.style.cursor = 'default';
            if (telemetryLog.length > 0) btnDownload.style.display = 'block';
        }

        let lastSoundTime = 0;

        // NOWOŚĆ: Funkcja płynnie zmieniająca właściwości latarki na bazie błędu postawy
        function applyFlashlightBiofeedback() {
            // Obliczamy stopień błędu (znormalizowany w przybliżeniu od 0.0 do 1.0)
            let errorFactor = Math.abs(currentHeadDeviation) / (HEAD_TOLERANCE * 2);
            errorFactor = Math.max(0, Math.min(1, errorFactor)); // Przytnij do zakresu 0 - 1

            if (isHeadMoving) {
                // EFEKT ROZŁADOWANEJ BATERII:
                // Jasność (opacity) spada płynnie z 1.0 do 0.20
                let currentOpacity = 1.0 - (errorFactor * 0.80);
                // Barwa przechodzi z bieli w brudną czerwień/ciepły bursztyn
                let red = Math.round(255);
                let green = Math.round(255 - (errorFactor * 200)); // Mniej zielonego -> bardziej czerwono
                let blue = Math.round(255 - (errorFactor * 255));  // Brak niebieskiego -> czysta czerwień/żółć

                flashlight.style.background = `radial-gradient(circle, rgba(${red},${green},${blue},${currentOpacity}) 0%, rgba(${red},${green},0,${currentOpacity * 0.4}) 50%, rgba(0,0,0,0) 75%)`;
                flashlight.style.border = `2px dashed rgba(255, 50, 0, ${0.1 + (errorFactor * 0.3)})`;
            } else {
                // STAN IDEALNY: Pełna moc, białe światło, niebiesko-turkusowa obwódka
                flashlight.style.background = `radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.45) 40%, rgba(255,255,255,0) 70%)`;
                flashlight.style.border = `2px dashed rgba(0, 255, 204, 0.4)`;
            }
        }

        function gameLoop() {
            if (!isGameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            flashlight.style.left = currentX + 'px';
            flashlight.style.top = currentY + 'px';

            // Aplikacja efektu starej baterii bezpośrednio na latarkę
            applyFlashlightBiofeedback();

            let nowTime = performance.now();

            // --- TRYB 1: GONIĄCA RAKIETA ---
            if (gameMode === 'rocket') {
                let oldX = rocketMode1.x; let oldY = rocketMode1.y;
                rocketMode1.x += rocketMode1.speed * rocketMode1.direction;
                if (rocketMode1.x > canvas.width * 0.9 || rocketMode1.x < canvas.width * 0.05) rocketMode1.direction *= -1;
                rocketMode1.y = canvas.height / 2 + Math.sin(rocketMode1.x * 0.01) * 40;
                rocketMode1.angle = Math.atan2(rocketMode1.y - oldY, rocketMode1.x - oldX);

                targetPos.x = rocketMode1.x; targetPos.y = rocketMode1.y;

                let dist = Math.hypot(currentX - rocketMode1.x, currentY - rocketMode1.y);
                if (dist < 75 && !isHeadMoving) {
                    rocketMode1.isLit = true; rocketMode1.pulse += 0.15;
                    if (nowTime - lastSoundTime > 120) {
                        playBeep(440 + Math.sin(rocketMode1.pulse)*40, 0.08, "triangle"); lastSoundTime = nowTime;
                    }
                } else { rocketMode1.isLit = false; }

                if (rocketMode1.isLit) {
                    ctx.beginPath(); ctx.arc(rocketMode1.x, rocketMode1.y, 35 + Math.sin(rocketMode1.pulse) * 6, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 204, 0.15)'; ctx.fill();
                }
                drawVectorRocket(rocketMode1.x, rocketMode1.y, rocketMode1.radius, rocketMode1.angle, rocketMode1.isLit, rocketMode1.pulse);

            // --- TRYB 2: ROBACZEK ---
            } else if (gameMode === 'bug') {
                ctx.beginPath(); ctx.lineWidth = 35; ctx.strokeStyle = '#101030'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                for (let i = 0; i < mazePoints.length; i++) {
                    if (i === 0) ctx.moveTo(mazePoints[i].x, mazePoints[i].y); else ctx.lineTo(mazePoints[i].x, mazePoints[i].y);
                }
                ctx.stroke();

                let currentPointIndex = Math.floor(bug.progress * (mazePoints.length - 1));
                let bugPos = mazePoints[currentPointIndex];
                targetPos.x = bugPos.x; targetPos.y = bugPos.y;

                let distanceToFlashlight = Math.hypot(currentX - bugPos.x, currentY - bugPos.y);
                if (distanceToFlashlight < 60 && !isHeadMoving) {
                    bug.progress += bug.speed;
                    if(!bug.isLit) playBeep(500, 0.05);
                    bug.isLit = true;
                    if (bug.progress >= 1.0) {
                        bug.progress = 0; playBeep(600, 0.3);
                        hudText.innerText = "✨ Super! Labirynt ukończony! ✨";
                        setTimeout(() => { if(isGameRunning) hudText.innerText = "Oświetlaj robaczka, aby szedł! [R - Kalibracja]"; }, 2000);
                    }
                } else { bug.isLit = false; }

                ctx.beginPath(); ctx.arc(bugPos.x, bugPos.y, bug.size, 0, Math.PI * 2);
                ctx.fillStyle = bug.isLit ? '#00ffcc' : '#005544'; ctx.fill();

            // --- TRYB 3: PIERWOTNA RAKIETA ---
            } else if (gameMode === 'classic') {
                classicRocket.x += classicRocket.vx; classicRocket.y += classicRocket.vy;
                if(classicRocket.x < canvas.width*0.1 || classicRocket.x > canvas.width*0.9) classicRocket.vx *= -1;
                if(classicRocket.y < canvas.height*0.1 || classicRocket.y > canvas.height*0.9) classicRocket.vy *= -1;
                classicRocket.angle = Math.atan2(classicRocket.vy, classicRocket.vx);

                targetPos.x = classicRocket.x; targetPos.y = classicRocket.y;

                let dist = Math.hypot(currentX - classicRocket.x, currentY - classicRocket.y);
                let isLit = dist < 65;

                if (isLit && !isHeadMoving) {
                    classicRocket.lockTime += 16.6; 
                    ctx.beginPath(); ctx.arc(classicRocket.x, classicRocket.y, classicRocket.radius + 15, 0, (Math.PI * 2) * (classicRocket.lockTime / 1500));
                    ctx.lineWidth = 4; ctx.strokeStyle = '#ffcc00'; ctx.stroke();

                    if(nowTime % 300 < 20) playBeep(300 + (classicRocket.lockTime/5), 0.04);

                    if (classicRocket.lockTime >= 1500) {
                        createExplosion(classicRocket.x, classicRocket.y); playBeep(180, 0.4, "sawtooth"); 
                        classicRocket.score++; hudText.innerText = `Tryb 3: Punkty: ${classicRocket.score} [R - Kalibracja]`;
                        spawnClassicRocket();
                    }
                } else {
                    classicRocket.lockTime = Math.max(0, classicRocket.lockTime - 12); 
                }

                drawVectorRocket(classicRocket.x, classicRocket.y, classicRocket.radius, classicRocket.angle, (isLit && !isHeadMoving), classicRocket.lockTime*0.02);

            // --- TRYB 4: NIERUCHOMA RAKIETA ---
            } else if (gameMode === 'static') {
                targetPos.x = staticRocket.x; targetPos.y = staticRocket.y;

                let dist = Math.hypot(currentX - staticRocket.x, currentY - staticRocket.y);
                let isLit = dist < 65;

                if (isLit && !isHeadMoving) {
                    staticRocket.lockTime += 16.6;
                    ctx.beginPath(); ctx.arc(staticRocket.x, staticRocket.y, staticRocket.radius + 15, 0, (Math.PI * 2) * (staticRocket.lockTime / 1500));
                    ctx.lineWidth = 4; ctx.strokeStyle = '#00ffcc'; ctx.stroke();

                    if(nowTime % 300 < 20) playBeep(350 + (staticRocket.lockTime/4), 0.04);

                    if (staticRocket.lockTime >= 1500) {
                        createExplosion(staticRocket.x, staticRocket.y); playBeep(220, 0.35, "sine");
                        staticRocket.score++; hudText.innerText = `Tryb 4: Punkty: ${staticRocket.score} [R - Kalibracja]`;
                        spawnStaticRocket();
                    }
                } else {
                    staticRocket.lockTime = Math.max(0, staticRocket.lockTime - 15);
                }

                drawVectorRocket(staticRocket.x, staticRocket.y, staticRocket.radius, staticRocket.angle, (isLit && !isHeadMoving), staticRocket.lockTime*0.02);
            }

            // Eksplozje
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if(p.alpha <= 0) { particles.splice(i, 1); } 
                else {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha; ctx.fill(); ctx.globalAlpha = 1.0;
                }
            }

            // TELEMETRIA
            let elapsed = nowTime - sessionStartTime;
            if (elapsed - lastLogTime >= 50) {
                telemetryLog.push({
                    timestamp: Math.round(elapsed),
                    targetX: Math.round(targetPos.x),
                    targetY: Math.round(targetPos.y),
                    gazeX: Math.round(currentX),
                    gazeY: Math.round(currentY),
                    headMovement: isHeadMoving ? 1 : 0,
                    headDeviation: roundTo(currentHeadDeviation, 4)
                });
                lastLogTime = elapsed;
            }

            requestAnimationFrame(gameLoop);
        }

        function roundTo(num, places) { return +(Math.round(num + "e+" + places)  + "e-" + places); }

        window.addEventListener('mousemove', (e) => {
            currentX = e.clientX; currentY = e.clientY;
        });

        // Klawisz R kalibruje pozycję głowy, ESC wychodzi do menu
        window.addEventListener('keydown', (e) => {
            if (isGameRunning && (e.key === 'r' || e.key === 'R')) {
                calibrateHeadPosition();
            }
            if (isGameRunning && e.key === 'Escape') {
                exitToMenu();
            }
        });

        // --- MEDIAPIPE: DETEKCJA TWARZY ---
        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const noseX = results.multiFaceLandmarks[0][4].x;
                lastNoseX = noseX;
                
                if (baseHeadX === null) baseHeadX = noseX;
                
                currentHeadDeviation = noseX - baseHeadX;

                if (Math.abs(currentHeadDeviation) > HEAD_TOLERANCE) {
                    isHeadMoving = true;
                } else {
                    isHeadMoving = false;
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });
        camera.start();

        // --- ZAPIS CSV ---
        function downloadCSV() {
            if (telemetryLog.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,Czas_ms,Cel_X,Cel_Y,Wzrok_X,Wzrok_Y,Blad_Glowy,Surowy_Odchyl_X\n";
            telemetryLog.forEach(row => {
                csvContent += `${row.timestamp},${row.targetX},${row.targetY},${row.gazeX},${row.gazeY},${row.headMovement},${row.headDeviation}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `raport_baterii_A_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
