<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Optometryczny - 3 Tryby v2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020208;
            font-family: 'Segoe UI', Arial, sans-serif; cursor: none;
        }

        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050514; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
            cursor: default;
        }
        .setup-section {
            background: rgba(255,255,255,0.05); padding: 25px; 
            border-radius: 15px; margin: 15px; width: 350px; text-align: center;
            border: 1px solid #1a1a3a;
        }
        select, button {
            padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 25px;
            border: none; margin-top: 10px; width: 100%; cursor: pointer; font-family: inherit;
        }
        select { background: #1a1a3a; color: white; border: 1px solid #333; }
        #btn-start { background: #ff3366; color: white; font-size: 1.5rem; margin-top: 20px; box-shadow: 0 0 20px #ff3366; }
        #btn-start:hover { background: #00ffcc; color: black; box-shadow: 0 0 20px #00ffcc; }

        #game-container { position: relative; width: 100vw; height: 100vh; display: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #flashlight {
            position: absolute; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0) 70%);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: screen; left: 50%; top: 50%; z-index: 5;
        }

        #hud-panel { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 1000; font-size: 1.5rem; text-shadow: 0 0 10px #000; }
        #btn-back { position: absolute; top: 20px; right: 20px; background: #333; color: white; width: auto; font-size: 0.9rem; padding: 8px 15px; z-index: 1000; }
        
        #webcam-container { position: absolute; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #333; border-radius: 8px; overflow: hidden; opacity: 0.3; transform: scaleX(-1); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #warning-overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(200, 0, 0, 0.9); color: white; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center; 
        }
        .warning-title { font-size: 3.5rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .warning-subtitle { font-size: 1.6rem; margin-bottom: 35px; color: #ffcccc; }
        .warning-actions { display: flex; gap: 20px; width: 500px; }
        .btn-warning { font-size: 1.1rem; padding: 15px 25px; border-radius: 30px; border: 2px solid white; transition: all 0.2s; }
        #btn-recalibrate { background: white; color: #c80000; }
        #btn-recalibrate:hover { background: #00ffcc; color: black; border-color: #00ffcc; }
        #btn-menu-exit { background: transparent; color: white; }
        #btn-menu-exit:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 style="font-size: 2.5rem; margin-bottom: 5px; letter-spacing: 1px;">TRENING OPTOMETRYCZNY</h1>
        <p style="color: #878787; margin-bottom: 35px;">Zezwól na dostęp do kamery i wybierz ćwiczenie</p>

        <div class="setup-section">
            <label style="font-weight: bold; color: #00ffcc;">WYBIERZ TRYB GRY:</label>
            <select id="game-mode-select" onchange="toggleMazeOptions()">
                <option value="rocket">Tryb 1: Goniąca Rakieta (Płynny ruch)</option>
                <option value="bug">Tryb 2: Robaczek w labiryncie</option>
                <option value="classic">Tryb 3: Pierwotna Rakieta (Fiksacja + Wybuch)</option>
            </select>
        </div>

        <div class="setup-section" id="maze-config" style="display: none;">
            <label style="font-weight: bold; color: #ffcc00;">WYBIERZ WERSJĘ LABIRYNTU:</label>
            <select id="maze-type-select">
                <option value="1">Labirynt 1: Prosta Fala</option>
                <option value="2">Labirynt 2: Średnia Pętla</option>
                <option value="3">Labirynt 3: Zakręcona Spirala</option>
            </select>
        </div>

        <div style="width: 350px;">
            <button id="btn-start" onclick="startGame()">URUCHOM ĆWICZENIE 🚀</button>
        </div>
    </div>

    <div id="game-container">
        <button id="btn-back" onclick="exitToMenu()">⚙️ MENU</button>
        <div id="hud-panel"><span id="hud-text">Uruchamianie...</span></div>
        <canvas id="game-canvas"></canvas>
        <div id="flashlight"></div>
        
        <div id="warning-overlay">
            <div class="warning-title">NIE RUSZAJ GŁOWĄ!</div>
            <div class="warning-subtitle">Trzymaj pozycję pionową, pracuj tylko oczami.</div>
            <div class="warning-actions">
                <button class="btn-warning" id="btn-menu-exit" onclick="exitToMenu()">⚙️ WYJŚĆ DO MENU</button>
                <button class="btn-warning" id="btn-recalibrate" onclick="recalibrateHead()">🔄 REKALIBRACJA</button>
            </div>
        </div>
    </div>

    <div id="webcam-container"><video id="webcam" autoplay playsinline></video></div>

    <script>
        const menuScreen = document.getElementById('menu-screen');
        const gameContainer = document.getElementById('game-container');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const flashlight = document.getElementById('flashlight');
        const warningOverlay = document.getElementById('warning-overlay');
        const videoElement = document.getElementById('webcam');
        const hudText = document.getElementById('hud-text');

        let gameMode = 'rocket';
        let mazeType = '1';
        let isGameRunning = false;

        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;

        let isHeadMoving = false;
        let baseHeadX = null;
        let lastNoseX = null;

        // Generator dźwięków terapeutycznych (Web Audio API)
        let audioCtx = null;
        function playBeep(freq, duration, type="sine") {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // --- STRUKTURY OBIEKTÓW ---
        let rocketMode1 = { x: 0, y: 0, speed: 3.5, direction: 1, isLit: false, pulse: 0 };
        let bug = { progress: 0, speed: 0.002, size: 12, isLit: false };
        let mazePoints = [];

        // Tryb 3: Pierwotna Rakieta
        let classicRocket = { x: 0, y: 0, vx: 2, vy: 1, size: 20, lockTime: 0, score: 0 };
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function toggleMazeOptions() {
            const mode = document.getElementById('game-mode-select').value;
            document.getElementById('maze-config').style.display = (mode === 'bug') ? 'block' : 'none';
        }

        function generateMaze(type) {
            mazePoints = [];
            const w = canvas.width; const h = canvas.height;
            if (type === '1') { 
                for (let x = w * 0.1; x <= w * 0.9; x += 5) {
                    let y = h / 2 + Math.sin(x * 0.008) * (h * 0.15);
                    mazePoints.push({ x, y });
                }
            } else if (type === '2') { 
                for (let t = 0; t < Math.PI * 2; t += 0.01) {
                    let x = w / 2 + Math.sin(t) * (w * 0.35);
                    let y = h / 2 + Math.sin(t * 2) * (h * 0.25);
                    mazePoints.push({ x, y });
                }
            } else { 
                let centerX = w / 2; let centerY = h / 2;
                for (let angle = 0; angle < Math.PI * 6; angle += 0.02) {
                    let radius = (angle * 22) + 40;
                    let x = centerX + Math.cos(angle) * radius;
                    let y = centerY + Math.sin(angle) * radius;
                    if(x > w*0.05 && x < w*0.95 && y > h*0.05 && y < h*0.95) mazePoints.push({ x, y });
                }
            }
        }

        function spawnClassicRocket() {
            classicRocket.x = Math.random() * (canvas.width * 0.6) + (canvas.width * 0.2);
            classicRocket.y = Math.random() * (canvas.height * 0.6) + (canvas.height * 0.2);
            classicRocket.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + 1.5);
            classicRocket.vy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.5 + 1);
            classicRocket.lockTime = 0;
        }

        function createExplosion(x, y) {
            for(let i=0; i<25; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    alpha: 1,
                    color: `hsl(${Math.random() * 60 + 340}, 100%, 60%)`
                });
            }
        }

        function startGame() {
            gameMode = document.getElementById('game-mode-select').value;
            mazeType = document.getElementById('maze-type-select').value;

            menuScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            document.body.style.cursor = 'none';

            if (gameMode === 'rocket') {
                rocketMode1.x = canvas.width * 0.1;
                rocketMode1.y = canvas.height / 2;
                hudText.innerText = "Tryb 1: Śledź i rozświetlaj lecącą rakietę!";
            } else if (gameMode === 'bug') {
                generateMaze(mazeType);
                bug.progress = 0;
                hudText.innerText = "Tryb 2: Oświetlaj robaczka, aby szedł do wyjścia!";
            } else if (gameMode === 'classic') {
                classicRocket.score = 0;
                particles = [];
                spawnClassicRocket();
                hudText.innerText = `Tryb 3: Przytrzymaj wzrok na rakiecie! Punkty: ${classicRocket.score}`;
            }

            isGameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function exitToMenu() {
            isGameRunning = false;
            isHeadMoving = false;
            warningOverlay.style.display = 'none';
            gameContainer.style.display = 'none';
            menuScreen.style.display = 'flex';
            document.body.style.cursor = 'default';
        }

        function recalibrateHead() {
            if (lastNoseX !== null) {
                baseHeadX = lastNoseX;
                isHeadMoving = false;
                warningOverlay.style.display = 'none';
                document.body.style.cursor = 'none';
            }
        }

        let lastSoundTime = 0;

        function gameLoop() {
            if (!isGameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            flashlight.style.left = currentX + 'px';
            flashlight.style.top = currentY + 'px';

            if (isHeadMoving) {
                warningOverlay.style.display = 'flex';
                document.body.style.cursor = 'default';
                requestAnimationFrame(gameLoop);
                return;
            }

            // --- TRYB 1: GONIĄCA RAKIETA ---
            if (gameMode === 'rocket') {
                rocketMode1.x += rocketMode1.speed * rocketMode1.direction;
                if (rocketMode1.x > canvas.width * 0.9 || rocketMode1.x < canvas.width * 0.05) {
                    rocketMode1.direction *= -1;
                }
                rocketMode1.y = canvas.height / 2 + Math.sin(rocketMode1.x * 0.01) * 40;

                // Detekcja trafienia latarką
                let dist = Math.hypot(currentX - rocketMode1.x, currentY - rocketMode1.y);
                if (dist < 75) {
                    rocketMode1.isLit = true;
                    rocketMode1.pulse += 0.15;
                    
                    let now = performance.now();
                    if (now - lastSoundTime > 120) {
                        playBeep(440 + Math.sin(rocketMode1.pulse)*40, 0.08, "triangle");
                        lastSoundTime = now;
                    }
                } else {
                    rocketMode1.isLit = false;
                }

                if (rocketMode1.isLit) {
                    ctx.beginPath();
                    ctx.arc(rocketMode1.x, rocketMode1.y, 25 + Math.sin(rocketMode1.pulse) * 6, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 204, 0.3)';
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#00ffcc';
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(rocketMode1.x, rocketMode1.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = rocketMode1.isLit ? '#00ffcc' : '#ff3366';
                ctx.shadowBlur = rocketMode1.isLit ? 20 : 5;
                ctx.shadowColor = rocketMode1.isLit ? '#00ffcc' : '#ff3366';
                ctx.fill();
                ctx.shadowBlur = 0;

            // --- TRYB 2: ROBACZEK ---
            } else if (gameMode === 'bug') {
                ctx.beginPath();
                ctx.lineWidth = 35; ctx.strokeStyle = '#101030';
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                for (let i = 0; i < mazePoints.length; i++) {
                    if (i === 0) ctx.moveTo(mazePoints[i].x, mazePoints[i].y);
                    else ctx.lineTo(mazePoints[i].x, mazePoints[i].y);
                }
                ctx.stroke();

                ctx.lineWidth = 2; ctx.strokeStyle = '#005588'; ctx.stroke();

                let currentPointIndex = Math.floor(bug.progress * (mazePoints.length - 1));
                let bugPos = mazePoints[currentPointIndex];

                let distanceToFlashlight = Math.hypot(currentX - bugPos.x, currentY - bugPos.y);
                
                if (distanceToFlashlight < 60) {
                    bug.progress += bug.speed;
                    if(!bug.isLit) playBeep(500, 0.05);
                    bug.isLit = true;
                    if (bug.progress >= 1.0) {
                        bug.progress = 0; 
                        playBeep(600, 0.3); playBeep(800, 0.4);
                        hudText.innerText = "✨ Super! Labirynt ukończony! ✨";
                        setTimeout(() => { hudText.innerText = "Oświetlaj robaczka, aby szedł!"; }, 2000);
                    }
                } else {
                    bug.isLit = false;
                }

                ctx.beginPath();
                ctx.arc(bugPos.x, bugPos.y, bug.size, 0, Math.PI * 2);
                ctx.fillStyle = bug.isLit ? '#00ffcc' : '#005544';
                ctx.shadowBlur = bug.isLit ? 15 : 0;
                ctx.shadowColor = '#00ffcc';
                ctx.fill();
                ctx.shadowBlur = 0;

            // --- TRYB 3: PIERWOTNA RAKIETA ---
            } else if (gameMode === 'classic') {
                classicRocket.x += classicRocket.vx;
                classicRocket.y += classicRocket.vy;

                if(classicRocket.x < canvas.width*0.1 || classicRocket.x > canvas.width*0.9) classicRocket.vx *= -1;
                if(classicRocket.y < canvas.height*0.1 || classicRocket.y > canvas.height*0.9) classicRocket.vy *= -1;

                let dist = Math.hypot(currentX - classicRocket.x, currentY - classicRocket.y);
                if (dist < 65) {
                    classicRocket.lockTime += 16.6; 
                    
                    ctx.beginPath();
                    ctx.arc(classicRocket.x, classicRocket.y, classicRocket.size + 10, 0, (Math.PI * 2) * (classicRocket.lockTime / 1500));
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#ffcc00';
                    ctx.stroke();

                    if(performance.now() % 300 < 20) playBeep(300 + (classicRocket.lockTime/5), 0.04);

                    if (classicRocket.lockTime >= 1500) {
                        createExplosion(classicRocket.x, classicRocket.y);
                        playBeep(180, 0.4, "sawtooth"); 
                        classicRocket.score++;
                        hudText.innerText = `Tryb 3: Przytrzymaj wzrok na rakiecie! Punkty: ${classicRocket.score}`;
                        spawnClassicRocket();
                    }
                } else {
                    classicRocket.lockTime = Math.max(0, classicRocket.lockTime - 12); 
                }

                ctx.beginPath();
                ctx.arc(classicRocket.x, classicRocket.y, classicRocket.size, 0, Math.PI * 2);
                ctx.fillStyle = '#ff3366';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff3366';
                ctx.fill();
                ctx.shadowBlur = 0;

                for(let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.alpha -= 0.02;
                    if(p.alpha <= 0) {
                        particles.splice(i, 1);
                    } else {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.alpha;
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('mousemove', (e) => {
            if (isHeadMoving || !isGameRunning) return;
            currentX = e.clientX;
            currentY = e.clientY;
        });

        // --- MEDIAPIPE FACE MESH ---
        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const noseX = results.multiFaceLandmarks[0][4].x;
                lastNoseX = noseX;
                
                if (baseHeadX === null) baseHeadX = noseX;
                
                if (Math.abs(noseX - baseHeadX) > 0.022) {
                    isHeadMoving = true;
                } else {
                    if(warningOverlay.style.display === 'flex' && Math.abs(noseX - baseHeadX) <= 0.022) {
                        isHeadMoving = false;
                        warningOverlay.style.display = 'none';
                        document.body.style.cursor = 'none';
                    }
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
